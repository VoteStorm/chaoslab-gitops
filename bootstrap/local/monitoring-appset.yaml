apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: monitoring
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/VoteStorm/chaoslab-gitops.git
        revision: fix/on-prem/#5-grafana-datasource
        files:
          - path: apps/monitoring/*/app.yaml
  template:
    metadata:
      name: "{{ .name }}"
    spec:
      project: default
      sources:
        - repoURL: https://github.com/VoteStorm/chaoslab-gitops.git
          targetRevision: fix/on-prem/#5-grafana-datasource
          ref: values
        - repoURL: "{{ .repoURL }}"
          chart: "{{ .chart }}"
          targetRevision: "{{ .targetRevision }}"
          helm:
            valueFiles:
              - $values/apps/monitoring/{{ .name }}/values.yaml         # 공통
              - $values/apps/monitoring/{{ .name }}/local/values.yaml   # 환경별
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .namespace }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
