replicaCount: 3
hpa:
  enabled: true
  maxReplicas: 10
  cpu: 80
serviceMonitor:
  enabled: true
  additionalLabels:
    release: kube-prometheus-stack
resources:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi
faults:
  delay: 0
  error: 0
podDisruptionBudget:
  minAvailable: 2
ingress:
  enabled: true
  className: nginx
