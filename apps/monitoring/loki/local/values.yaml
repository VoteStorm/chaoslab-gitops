compactor:
  working_directory: /data/loki/compactor

storage:
  type: filesystem

loki:
  persistence:
    storageClass: local-path
    mountPath: /data/loki

promtail:
  config:
    clients:
    - url: http://loki.logging.svc.cluster.local:3100/loki/api/v1/push
    positions:
      filename: /tmp/positions.yaml
